<!DOCTYPE html>
<html>

<head>
<title>CareerHub Job Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">

<h2 class="logo">CareerHub</h2>

<ul>
<li>Home</li>
<li>Jobs</li>
<li>Companies</li>
<li>Contact</li>
</ul>

<button class="post-btn">Post Job</button>
<button id="darkToggle">Dark Mode</button>

</nav>


<section class="hero">

<h1>Find Your Dream Job</h1>

<p>Explore thousands of job opportunities</p>

<button class="resume-btn">Upload Resume</button>

</section>


<section class="search-section">

<input type="text" id="searchInput" placeholder="Search job">

<select id="categoryFilter">

<option value="">Category</option>
<option value="IT">IT</option>
<option value="Design">Design</option>
<option value="Marketing">Marketing</option>

</select>

<select id="locationFilter">

<option value="">Location</option>
<option value="Mumbai">Mumbai</option>
<option value="Bangalore">Bangalore</option>
<option value="Delhi">Delhi</option>

</select>

</section>


<section class="jobs">

<h2>Latest Jobs</h2>

<div id="jobList" class="job-container"></div>

</section>


<footer>

<p>© 2026 CareerHub Job Portal</p>

</footer>

<div id="postModal" class="modal">

<div class="modal-content">

<span id="closePost">&times;</span>

<h2>Post New Job</h2>

<input id="jobTitle" placeholder="Job Title"><br><br>

<input id="jobCompany" placeholder="Company Name"><br><br>

<input id="jobLocation" placeholder="Location"><br><br>

<select id="jobCategory">

<option value="IT">IT</option>
<option value="Design">Design</option>
<option value="Marketing">Marketing</option>

</select><br><br>

<button id="submitJob">Add Job</button>

</div>

</div>


<div id="jobModal" class="modal">

<div class="modal-content">

<span id="closeModal">&times;</span>

<h2 id="modalTitle"></h2>

<p id="modalCompany"></p>

<p id="modalLocation"></p>

<button id="applyBtn">Apply Now</button>

</div>

</div>


<div id="applyModal" class="modal">

<div class="modal-content">

<span id="closeApply">&times;</span>

<h2>Apply for Job</h2>

<input type="text" placeholder="Your Name"><br><br>

<input type="email" placeholder="Email"><br><br>

<button>Submit Application</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
